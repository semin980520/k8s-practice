apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  namespace: semin-ns
spec:
  replicas: 2
  # 아래에 라벨은 replicaset이 관리해야 할 파드를 결정하는데 사용
  selector:
    matchLabels:
      app: my-nginx
  template:
  # 아래에 라벨은 service에서 라우팅 할 대상이되는 라벨이자 그룹이다.
    metadata:
      labels:
        app: my-nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
  namespace: semin-ns
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: my-nginx
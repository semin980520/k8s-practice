apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-backend-hpa
  namespace: min
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ordersystem-deployment # 어떤 디플로이먼트인지 이름 
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
server:
  port: 8080
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver  #드라이버
#    아래 ${} 부분은 파들르 실행하는 시점에 k8s에 secret 자원에서 불러와서 주입
    url: jdbc:mariadb://${DB_HOST}:3306/ordersystem?useSSL=true  #mariadb 주소 / 스키마명
    username: admin
    password: ${DB_PW}
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create

    show_sql: true
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB
  redis:
    host: my-redis
    port: 6379

jwt:
  expiration: 30
  secretKey: YmV5b25kYWNjZXNzdG9rZW5zZWNyZXRrZXliZXlvbmRhY2Nlc3N0b2tlbnNlY3JldGtleWJleW9uZGFjY2Vzc3Rva2Vuc2VjcmV0a2V5
  expirationRt: 30000
  secretKeyRt: YmV5b25kYWNjZXNzdG9rZW5zZWNyZXRrZXliZXlvbmRhY2Nlc3N0b2tlbnNlY3JldGtleWJleW9uZGFjY2Vzc3Rva2Vuc2VjcmV0a2V5

logging:
  level:
    root: info

aws:
  credentials:
    access-key: xxxxxxxxxxxxxxxxxxxxxxxxx
    secret-key: yyyyyyyyyyyyyyyyyyyyyyy

  region: ap-northeast-2
  s3:
    bucket1: ordersystem-user
